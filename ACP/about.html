<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* Header */
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Main content */
        content {
            padding: 20px;
            min-height: 400px;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <h1>My Simple Website</h1>
        <p>Welcome to My Simple Website</p>
    </header>
    <!-- Navigation -->
    <nav>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
    <!-- Content -->
    <content>
        <div class="content">
            <h2>About section</h2>
            <p>This is the about section of the website.</p>
            <p>We create simple and effective websites for our clients.</p>
        </div>
    </content>
    <!-- Footer -->
    <footer>
        <p>&copy; 2024 My Simple Website | All rights reserved.</p>
    </footer>
</body>

</html>
